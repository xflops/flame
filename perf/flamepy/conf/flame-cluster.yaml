---
cluster:
  name: flame
  endpoint: "http://flame-session-manager:8080"
  slot: "cpu=2,mem=1g"
  policies:
    - priority
    - fairshare
    - gang
  storage: none
  schedule_interval: 100
  pprof:
    port: 6060 # optional, defaults to 6060
  executors:
    shim: host
  limits:
    max_sessions: 1000
    max_executors: 10
#  tls:
#    cert_file: "/etc/flame/certs/server.crt"
#    key_file: "/etc/flame/certs/server.key"
#    ca_file: "/etc/flame/certs/ca.crt"
cache:
  endpoint: "grpc://flame-object-cache:9090"
  network_interface: "eth0"
  pprof:
    port: 6061
  eviction:
    policy: "lru"
    max_memory: "1024M"
    max_objects: 100000
#  tls:
#    cert_file: "/etc/flame/certs/server.crt"
#    key_file: "/etc/flame/certs/server.key"
#    ca_file: "/etc/flame/certs/ca.crt"
