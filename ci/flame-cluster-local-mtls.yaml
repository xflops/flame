---
cluster:
  name: flame
  endpoint: "https://127.0.0.1:8080"
  slot: "cpu=1,mem=1g"
  policy: priority
  storage: fs://data/
  schedule_interval: 100           # Scheduler loop interval in milliseconds (default: 500)
  executors:
    shim: host
    limits:
      max_executors: 10
  tls:
    cert_file: "/etc/flame/certs/server.crt"
    key_file: "/etc/flame/certs/server.key"
    ca_file: "/etc/flame/certs/ca.crt"
    ca_key_file: "/etc/flame/certs/ca.key"
cache:
  endpoint: "grpcs://127.0.0.1:9090"
  network_interface: "br0"
  tls:
    cert_file: "/etc/flame/certs/server.crt"
    key_file: "/etc/flame/certs/server.key"
    ca_file: "/etc/flame/certs/ca.crt"
    ca_key_file: "/etc/flame/certs/ca.key"
