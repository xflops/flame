---
cluster:
  name: flame
  endpoint: "http://127.0.0.1:30080"
  slot: "cpu=1,mem=1g"
  policies:
    - priority
    - fairshare
    - gang
  storage: fs://data/
  schedule_interval: 100           # Scheduler loop interval in milliseconds (default: 500)
  executors:
    shim: host
  limits:
    max_executors: 10
cache:
  endpoint: "grpc://127.0.0.1:9090"
  network_interface: "br0"
